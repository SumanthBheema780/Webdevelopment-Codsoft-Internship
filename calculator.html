<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .calc {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .expr {
      font-size: 13px;
      color: #a8b2d8;
      min-height: 18px;
      word-break: break-all;
    }

    .main-display {
      font-size: 36px;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-all;
      letter-spacing: -1px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 500;
      height: 64px;
      cursor: pointer;
      transition: transform 0.08s, filter 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active { transform: scale(0.93); }

    .btn-num {
      background: #1a2744;
      color: #e2e8f0;
    }
    .btn-num:hover { filter: brightness(1.3); }

    .btn-op {
      background: #0f3460;
      color: #53a8fb;
      font-size: 20px;
    }
    .btn-op:hover { filter: brightness(1.3); }

    .btn-clear {
      background: #1a2744;
      color: #fc8181;
    }
    .btn-clear:hover { filter: brightness(1.3); }

    .btn-eq {
      background: #53a8fb;
      color: #fff;
      font-size: 22px;
    }
    .btn-eq:hover { filter: brightness(1.15); }

    .btn-span2 { grid-column: span 2; }
  </style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="main-display" id="screen">0</div>
  </div>
  <div class="btn-grid">
    <button class="btn btn-clear" id="btnAC">AC</button>
    <button class="btn btn-clear" id="btnDel">⌫</button>
    <button class="btn btn-op" data-op="%">%</button>
    <button class="btn btn-op" data-op="÷">÷</button>

    <button class="btn btn-num" data-num="7">7</button>
    <button class="btn btn-num" data-num="8">8</button>
    <button class="btn btn-num" data-num="9">9</button>
    <button class="btn btn-op" data-op="×">×</button>

    <button class="btn btn-num" data-num="4">4</button>
    <button class="btn btn-num" data-num="5">5</button>
    <button class="btn btn-num" data-num="6">6</button>
    <button class="btn btn-op" data-op="−">−</button>

    <button class="btn btn-num" data-num="1">1</button>
    <button class="btn btn-num" data-num="2">2</button>
    <button class="btn btn-num" data-num="3">3</button>
    <button class="btn btn-op" data-op="+">+</button>

    <button class="btn btn-num btn-span2" data-num="0">0</button>
    <button class="btn btn-num" data-num=".">.</button>
    <button class="btn btn-eq" id="btnEq">=</button>
  </div>
</div>

<script>
  const screen = document.getElementById('screen');
  const exprEl = document.getElementById('expr');

  let current = '0';
  let expression = '';
  let justEvaluated = false;

  function updateDisplay() {
    screen.textContent = current.length > 12
      ? parseFloat(current).toExponential(4)
      : current;
    exprEl.textContent = expression;
  }

  function appendNum(val) {
    if (justEvaluated) { current = ''; expression = ''; justEvaluated = false; }
    if (val === '.' && current.includes('.')) return;
    if (current === '0' && val !== '.') current = val;
    else current += val;
    updateDisplay();
  }

  function appendOp(op) {
    justEvaluated = false;
    expression = (expression || current) + ' ' + op + ' ';
    current = '0';
    updateDisplay();
  }

  function calculate() {
    if (!expression) return;
    const full = expression + current;
    exprEl.textContent = full + ' =';
    const normalized = full
      .replace(/÷/g, '/')
      .replace(/×/g, '*')
      .replace(/−/g, '-')
      .replace(/(\d+)\s*%/g, '($1/100)');
    try {
      let result = Function('"use strict"; return (' + normalized + ')')();
      if (!isFinite(result)) { current = 'Error'; }
      else {
        result = parseFloat(result.toFixed(10));
        current = String(result);
      }
    } catch(e) { current = 'Error'; }
    expression = '';
    justEvaluated = true;
    updateDisplay();
  }

  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => appendNum(btn.dataset.num));
  });

  document.querySelectorAll('[data-op]').forEach(btn => {
    btn.addEventListener('click', () => appendOp(btn.dataset.op));
  });

  document.getElementById('btnEq').addEventListener('click', calculate);

  document.getElementById('btnAC').addEventListener('click', () => {
    current = '0'; expression = ''; justEvaluated = false; updateDisplay();
  });

  document.getElementById('btnDel').addEventListener('click', () => {
    if (justEvaluated) return;
    current = current.slice(0, -1) || '0';
    updateDisplay();
  });

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendNum('.');
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('−');
    else if (e.key === '*') appendOp('×');
    else if (e.key === '/') { e.preventDefault(); appendOp('÷'); }
    else if (e.key === '%') appendOp('%');
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') document.getElementById('btnDel').click();
    else if (e.key === 'Escape') document.getElementById('btnAC').click();
  });
</script>

</body>
</html>
